<div class="fp-layout">
  <div class="fp-card">
    <a routerLink="/login" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Quay lại đăng nhập
    </a>

    @if (!isSent()) {
      <div class="fp-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2 class="fp-title">Quên mật khẩu?</h2>
      <p class="fp-desc">Nhập email sinh viên, chúng tôi sẽ gửi link đặt lại mật khẩu cho bạn.</p>

      @if (errorMessage()) {
        <div class="alert-danger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMessage() }}
        </div>
      }

      <div class="inp-wrap">
        <label class="inp-label">Email sinh viên</label>
        <input class="inp" type="email" placeholder="masv@hvct.edu.vn"
          [value]="email()"
          (input)="email.set($any($event.target).value)">
      </div>

      <button class="btn-primary" (click)="onSubmit()" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="btn-spinner"></span> Đang gửi...
        } @else {
          Gửi link đặt lại mật khẩu
        }
      </button>
    } @else {
      <div class="success-state">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.85a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16"/>
          </svg>
        </div>
        <h2 class="fp-title">Đã gửi email!</h2>
        <p class="fp-desc">
          Chúng tôi đã gửi link đặt lại mật khẩu đến <strong>{{ email() }}</strong>.
          Vui lòng kiểm tra hộp thư.
        </p>
        <button class="btn-secondary" (click)="resend()">Gửi lại email</button>
      </div>
    }
  </div>
</div>
