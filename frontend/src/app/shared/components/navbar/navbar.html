<nav class="navbar">
  <div class="navbar-brand">
    <div class="brand-icon">
      <img src="https://lh3.googleusercontent.com/proxy/EWgziArQhxq6u-t6niC5ZRgMh047Fph7_l12CBeUbCl9CX1TUpgwAOEHwvLtnuLyKVqVPE4eHwdKdC6GJ6v3IkRoYVsdmMu2" alt="HVCT Logo" style="width: 100%; height: 100%; object-fit: contain;">
    </div>
    <div class="brand-text">
      <span class="brand-name">HVCT</span>
      <span class="brand-sub">Cao Đẳng Kỹ Nghệ II</span>
    </div>
  </div>

  <div class="navbar-center">
    <div class="greeting-badge">
      <span class="greeting-text">{{ greeting() }}, <strong>{{ firstName() }}</strong></span>
    </div>
  </div>

  <div class="navbar-actions">
    <!-- Notifications -->
    <button class="action-btn notification-btn" [routerLink]="currentUser().role === 'admin' ? '/admin/announcements' : '/notifications'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      @if (notificationCount() > 0) {
        <span class="badge">{{ notificationCount() }}</span>
      }
    </button>

    <!-- Profile -->
    <div class="profile-wrapper">
      <button class="profile-btn" (click)="toggleProfileMenu()">
        <div class="avatar">
          @if (currentUser().avatar) {
            <img [src]="currentUser().avatar" [alt]="currentUser().name">
          } @else {
            <span>{{ avatarInitials() }}</span>
          }
        </div>
        <div class="profile-info">
          <span class="profile-name">{{ currentUser().name }}</span>
          <span class="profile-id">{{ currentUser().studentId }}</span>
        </div>
        <svg class="chevron" [class.rotated]="isProfileMenuOpen()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      @if (isProfileMenuOpen()) {
        <div class="profile-dropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar">{{ avatarInitials() }}</div>
            <div>
              <div class="dropdown-name">{{ currentUser().name }}</div>
              <div class="dropdown-id">{{ currentUser().studentId }}</div>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" (click)="navigateTo('/students/profile')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Hồ sơ cá nhân
          </button>
          <button class="dropdown-item" (click)="navigateTo('/students/detail')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            Thông tin đầy đủ
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" (click)="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Đăng xuất
          </button>
        </div>
      }
    </div>
  </div>
</nav>
