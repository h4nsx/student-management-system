@if (visible()) {
  <div class="dialog-backdrop" (click)="onCancel()">
    <div class="dialog-panel" [class]="'type-' + type()" (click)="$event.stopPropagation()">
      <div class="dialog-icon">
        @if (type() === 'danger') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        }
        @if (type() === 'warning') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        }
        @if (type() === 'info') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        }
      </div>

      <h3 class="dialog-title">{{ title() }}</h3>
      <p class="dialog-message">{{ message() }}</p>

      <div class="dialog-actions">
        <button class="btn-cancel" (click)="onCancel()">{{ cancelLabel() }}</button>
        <button class="btn-confirm" [class]="'confirm-' + type()" (click)="onConfirm()">{{ confirmLabel() }}</button>
      </div>
    </div>
  </div>
}
